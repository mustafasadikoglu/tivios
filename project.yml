name: TiviOS
options:
  bundleIdPrefix: com.mustafasadikoglu
  xcodeVersion: "26.5"
  deploymentTarget:
    iOS: "16.0"
targets:
  TiviOS:
    type: application
    platform: iOS
    sources:
      - path: TiviOS/Sources
    info:
      path: TiviOS/Info.plist
      properties:
        CFBundleName: TiviOS
        CFBundleDisplayName: TiviOS
        CFBundleIdentifier: com.mustafasadikoglu.TiviOS
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: TiviOS
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsArbitraryLoadsForMedia: true
          NSAllowsLocalNetworking: true
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        SWIFT_VERSION: "5"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        CODE_SIGNING_ALLOWED: false
        CODE_SIGNING_REQUIRED: false
        CODE_SIGN_IDENTITY: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true

name: TiviOS Auto Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set Xcode Version to 16.0
      run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build Library Package & Test
      run: |
        xcodebuild test -scheme TiviOS -destination "platform=iOS Simulator,name=iPhone 15" > test.log 2>&1 || (cat test.log && exit 1)

    - name: Build Unsigned iOS Application IPA
      run: |
        xcodebuild build -project TiviOS.xcodeproj -scheme TiviOS -destination "generic/platform=iOS" -configuration Release -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
        mkdir Payload
        cp -r build/Build/Products/Release-iphoneos/TiviOS.app Payload/
        zip -r TiviOS.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TiviOS-iOS-App
        path: TiviOS.ipa

name: TiviOS Auto Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set Xcode Version
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Build Package
      run: xcodebuild build -scheme TiviOS -destination "platform=iOS Simulator,name=iPhone 15" -destination "platform=tvOS Simulator,name=Apple TV"

    - name: Run Unit Tests
      run: xcodebuild test -scheme TiviOS -destination "platform=iOS Simulator,name=iPhone 15"
